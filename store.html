<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cosmetic Store Spinner</title>
<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow-x: hidden;
}
h1 { margin-top: 40px; }

#spinnerWrapper {
    position: relative;
    width: 800px;
    margin: 40px auto;
    overflow: hidden;
    border: 3px solid white;
    border-radius: 12px;
}

#pointer {
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 35px solid white;
    position: absolute;
    top: -35px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
}

#spinner {
    display: flex;
    position: relative;
    transition: transform 5s cubic-bezier(.1,.7,.1,1);
}

.slot {
    width: 140px;
    height: 140px;
    margin-right: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border-radius: 8px;
    border: 2px solid #111;
    transition: transform 0.3s, box-shadow 0.3s;
}

/* Rarity colors */
.common { background:#777; }
.rare { background:#3b82f6; }
.epic { background:#a855f7; }
.legendary { background:#f59e0b; }

.rare { box-shadow:0 0 10px #3b82f6; }
.epic { box-shadow:0 0 20px #a855f7; }
.legendary { box-shadow:0 0 30px #f59e0b; }

#result { font-size: 24px; margin-top: 20px; }
#crateButton { margin-top: 20px; padding: 16px 40px; font-size: 22px; background:#1e1e1e; border-radius:10px; cursor:pointer; transition:0.2s; }
#crateButton:hover { transform:scale(1.05); }

#inventoryBox {
    width: 90%;
    margin: 40px auto;
    text-align: left;
}
.inventorySlot {
    display: inline-block;
    width: 120px;
    height: 120px;
    margin: 6px;
    border-radius: 8px;
    border:2px solid #111;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>Cosmetic Store Spinner</h1>
<div id="spinnerWrapper">
    <div id="pointer"></div>
    <div id="spinner"></div>
</div>
<div id="result"></div>
<button id="crateButton">OPEN CRATE</button>

<h2>Your Inventory</h2>
<div id="inventoryBox"></div>

<audio id="spinSound" src="spin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="confettiSound" src="confetti.mp3"></audio>

<script src="storeSpinner.js"></script>
</body>
</html>

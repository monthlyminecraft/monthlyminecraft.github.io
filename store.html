<!DOCTYPE html>
<html>
<head>
<title>Cosmetic Crate</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

h1{
margin-top:40px;
}

#crateButton{
margin-top:30px;
padding:16px 40px;
font-size:22px;
background:#1e1e1e;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

#crateButton:hover{
transform:scale(1.05);
}

#spinner{
width:720px;
height:140px;
margin:60px auto;
overflow:hidden;
border:3px solid white;
border-radius:10px;
position:relative;
}

#pointer{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:0;
height:0;
border-left:16px solid transparent;
border-right:16px solid transparent;
border-top:25px solid white;
z-index:10;
}

#items{
display:flex;
position:absolute;
left:0;
}

.item{
width:140px;
height:140px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
border-right:2px solid #111;
}

/* rarity colors */

.common{background:#777;}
.rare{background:#3b82f6;}
.epic{background:#a855f7;}
.legendary{background:#f59e0b;}

.rare{box-shadow:0 0 10px #3b82f6;}
.epic{box-shadow:0 0 20px #a855f7;}
.legendary{box-shadow:0 0 30px #f59e0b;}

#result{
font-size:28px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Cosmetic Crate</h1>

<div id="crateButton">OPEN CRATE</div>

<div id="spinner">

<div id="pointer"></div>

<div id="items"></div>

</div>

<div id="result"></div>

<audio id="spinSound" src="spin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<script src="crate.js"></script>

</body>
</html>

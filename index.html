<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly Minecraft SMP</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Landing / Hero Section -->
<div class="hero">
  <h1>MONTHLY MINECRAFT SMP</h1>
  <p>New World. New Twist. Every Month.</p>

  <div class="buttons">
    <a href="leaderboard.html">Leaderboard</a>
    <a href="players.html">Players</a>
  </div>

  <button onclick="copyIP()">Copy Server IP</button>
  <p id="playercount">Loading player count...</p>
</div>

<!-- Live Player List -->
<h2>Players Online</h2>
<div id="players" class="playergrid"></div>

<!-- Server Analytics -->
<h2>Server Analytics</h2>
<div id="analytics">
  <p id="serverversion"></p>
  <p id="motd"></p>
  <p id="uptime"></p>
</div>

<!-- Background Canvas for Minecraft-style Particles -->
<canvas id="bg"></canvas>

<!-- Include JS -->
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Minecraft Server</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Welcome to My MC Server</h1>
  <p>Play, build, and have fun!</p>
</header>

<section id="server-info">
  <h2>Server Stats</h2>
  <p>IP: play.myserver.com</p>
  <p>Players Online: <span id="players">Loading...</span></p>
</section>

<section id="leaderboard">
  <h2>Top Players</h2>
  <ol id="top-players">
    <li>Player1 - 100 Points</li>
    <li>Player2 - 95 Points</li>
    <li>Player3 - 80 Points</li>
  </ol>
</section>

<footer>
  <p>&copy; 2026 My MC Server</p>
</footer>

<script src="scripts.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Minecraft Server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated background canvas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Header -->
    <header>
        <h1>Monthly Minecraft Server</h1>
    </header>

    <!-- Server stats -->
    <section id="server-stats">
        <h2>Players Online: <span id="players">0</span></h2>
        <ul id="top-players"></ul>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Monthly Minecraft SMP</p>
    </footer>

    <script src="scripts.js" defer></script>
</body>
</html>
